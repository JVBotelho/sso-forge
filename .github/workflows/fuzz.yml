name: Fuzzing
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: FuzzServerChecksum
            path: ./pac/
          - target: FuzzBuild
            path: ./pac/
          - target: FuzzParseSID
            path: ./pac/
          - target: FuzzParseHashInput
            path: ./parse/
          - target: FuzzEncryptRC4
            path: ./ticket/
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version: '1.26'

      - name: Run fuzz test
        run: |
          go test -fuzz=${{ matrix.target }} -fuzztime=5m -run='^$' ${{ matrix.path }}
