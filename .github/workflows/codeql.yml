name: CodeQL
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 12 * * 1'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [go]
    steps:
      - uses: actions/checkout@11bd71901abe5b8200e2588b02e1923d7c00a5e3 # v4.2.2
        with:
          persist-credentials: false
      - uses: github/codeql-action/init@ddb66f71eddb8df0b4b1095d69f6e675181f2ad5 # v3.28.16
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/autobuild@ddb66f71eddb8df0b4b1095d69f6e675181f2ad5 # v3.28.16
      - uses: github/codeql-action/analyze@ddb66f71eddb8df0b4b1095d69f6e675181f2ad5 # v3.28.16
