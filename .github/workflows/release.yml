name: Release
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version: '1.26'

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Build release binaries
        run: make release

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: ./
          format: spdx-json
          output-file: dist/sbom.spdx.json

      - name: Sign artifacts with cosign
        run: |
          for f in dist/sso-forge-*; do
            cosign sign-blob --yes --output-signature "dist/$(basename $f).sig" --output-certificate "dist/$(basename $f).pem" "$f"
          done

      - name: Generate checksums
        run: |
          cd dist
          sha256sum sso-forge-* > checksums.txt
          cosign sign-blob --yes --output-signature checksums.txt.sig --output-certificate checksums.txt.pem checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: |
            dist/sso-forge-*
            dist/sbom.spdx.json
            dist/checksums.txt
            dist/*.sig
            dist/*.pem
          generate_release_notes: true
